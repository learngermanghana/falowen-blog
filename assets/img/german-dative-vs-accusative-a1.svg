<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">German Dative vs Accusative A1 Guide</title>
  <desc id="desc">Falowen grammar illustration comparing German dative and accusative with a simple A1 example sentence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="36" fill="url(#bg)"/>
  <circle cx="1090" cy="100" r="180" fill="#dbeafe" opacity=".65"/>
  <circle cx="95" cy="630" r="190" fill="#ffedd5" opacity=".75"/>
  <g transform="translate(72 80)">
    <text x="0" y="34" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ea580c" letter-spacing="3">FALOWEN • A1 GRAMMAR</text>
    <text x="0" y="116" font-family="Arial, sans-serif" font-size="62" font-weight="800" fill="#0f172a">Dative vs Accusative</text>
    <text x="0" y="170" font-family="Arial, sans-serif" font-size="27" fill="#475569">Learn the difference with simple German examples.</text>
  </g>
  <g transform="translate(72 300)">
    <rect width="470" height="230" rx="30" fill="#ffffff" stroke="#fed7aa" stroke-width="4"/>
    <text x="34" y="52" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#c2410c">DATIVE • WEM?</text>
    <text x="34" y="112" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">dem Mann</text>
    <text x="34" y="158" font-family="Arial, sans-serif" font-size="21" fill="#475569">the receiver / indirect object</text>
    <rect x="34" y="181" width="180" height="30" rx="15" fill="#ffedd5"/>
    <text x="124" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#c2410c">der → dem</text>
  </g>
  <g transform="translate(586 300)">
    <rect width="542" height="230" rx="30" fill="#ffffff" stroke="#bfdbfe" stroke-width="4"/>
    <text x="34" y="52" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">ACCUSATIVE • WEN / WAS?</text>
    <text x="34" y="112" font-family="Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">den Schlüssel</text>
    <text x="34" y="158" font-family="Arial, sans-serif" font-size="21" fill="#475569">the thing affected / direct object</text>
    <rect x="34" y="181" width="180" height="30" rx="15" fill="#dbeafe"/>
    <text x="124" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1d4ed8">der → den</text>
  </g>
  <g transform="translate(170 575)">
    <rect width="860" height="66" rx="25" fill="#0f172a"/>
    <text x="430" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#ffffff">Ich gebe dem Mann den Schlüssel.</text>
  </g>
</svg>