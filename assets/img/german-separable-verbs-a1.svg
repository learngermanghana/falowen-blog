<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title id="title">German separable verbs A1 guide</title><desc id="desc">A clean German learning graphic showing aufstehen split into stehe and auf with an example sentence.</desc><rect width="1200" height="700" fill="#f8fafc"/><rect x="70" y="70" width="1060" height="560" rx="36" fill="#ffffff" stroke="#e2e8f0" stroke-width="3"/><text x="120" y="160" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="700" fill="#ea580c">GERMAN A1 GRAMMAR</text><text x="120" y="245" font-family="Arial,Helvetica,sans-serif" font-size="58" font-weight="800" fill="#0f172a">Separable Verbs</text><text x="120" y="310" font-family="Arial,Helvetica,sans-serif" font-size="30" fill="#475569">Trennbare Verben einfach erklärt</text><rect x="120" y="370" width="960" height="150" rx="24" fill="#f1f5f9"/><text x="165" y="430" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="700" fill="#0f172a">aufstehen → Ich</text><text x="455" y="430" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="800" fill="#ea580c">stehe</text><text x="555" y="430" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="700" fill="#0f172a">um 7 Uhr</text><text x="755" y="430" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="800" fill="#ea580c">auf.</text><text x="165" y="480" font-family="Arial,Helvetica,sans-serif" font-size="24" fill="#64748b">prefix + verb → verb in position 2, prefix at the end</text><text x="120" y="580" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="700" fill="#334155">Falowen · Learn German step by step</text></svg>