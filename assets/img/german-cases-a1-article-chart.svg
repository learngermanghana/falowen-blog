<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">German Accusative and Dative Article Chart</title>
  <desc id="desc">A beginner chart showing German definite articles in nominative, accusative and dative cases.</desc>
  <rect width="1200" height="760" rx="34" fill="#ffffff"/>
  <rect x="44" y="42" width="1112" height="676" rx="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="3"/>
  <text x="82" y="108" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ea580c" letter-spacing="2">A1 QUICK CASE MAP</text>
  <text x="82" y="166" font-family="Arial, sans-serif" font-size="45" font-weight="800" fill="#0f172a">German articles: what changes?</text>
  <g transform="translate(82 220)" font-family="Arial, sans-serif">
    <rect width="1036" height="70" rx="18" fill="#0f172a"/>
    <text x="34" y="45" font-size="20" font-weight="700" fill="#ffffff">CASE</text>
    <text x="260" y="45" font-size="20" font-weight="700" fill="#ffffff">MASC.</text>
    <text x="455" y="45" font-size="20" font-weight="700" fill="#ffffff">FEM.</text>
    <text x="650" y="45" font-size="20" font-weight="700" fill="#ffffff">NEUT.</text>
    <text x="845" y="45" font-size="20" font-weight="700" fill="#ffffff">PLURAL</text>

    <rect y="88" width="1036" height="92" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="34" y="145" font-size="24" font-weight="800" fill="#334155">Nominative</text>
    <text x="260" y="145" font-size="28" font-weight="800" fill="#0f172a">der</text>
    <text x="455" y="145" font-size="28" font-weight="800" fill="#0f172a">die</text>
    <text x="650" y="145" font-size="28" font-weight="800" fill="#0f172a">das</text>
    <text x="845" y="145" font-size="28" font-weight="800" fill="#0f172a">die</text>

    <rect y="198" width="1036" height="92" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
    <text x="34" y="255" font-size="24" font-weight="800" fill="#c2410c">Accusative</text>
    <text x="260" y="255" font-size="28" font-weight="800" fill="#c2410c">den</text>
    <text x="455" y="255" font-size="28" font-weight="800" fill="#0f172a">die</text>
    <text x="650" y="255" font-size="28" font-weight="800" fill="#0f172a">das</text>
    <text x="845" y="255" font-size="28" font-weight="800" fill="#0f172a">die</text>

    <rect y="308" width="1036" height="92" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
    <text x="34" y="365" font-size="24" font-weight="800" fill="#1d4ed8">Dative</text>
    <text x="260" y="365" font-size="28" font-weight="800" fill="#1d4ed8">dem</text>
    <text x="455" y="365" font-size="28" font-weight="800" fill="#1d4ed8">der</text>
    <text x="650" y="365" font-size="28" font-weight="800" fill="#1d4ed8">dem</text>
    <text x="845" y="365" font-size="28" font-weight="800" fill="#1d4ed8">den + n</text>
  </g>
  <text x="82" y="678" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#475569">Memory tip: masculine accusative is the big A1 change: der → den.</text>
</svg>