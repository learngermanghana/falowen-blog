name: Auto Post Blog Updates to LinkedIn

on:
  push:
    branches:
      - main
    paths:
      - "_posts/*.md"
  workflow_run:
    workflows: ["30-Day Biweekly Blog Auto-Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      post_path:
        description: "Optional post file path (e.g. _posts/2026-03-29-example.md)"
        required: false
        type: string
      dry_run:
        description: "Run without publishing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  linkedin_publish:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Check publishing window
        id: cadence
        shell: bash
        run: |
          # Direct pushes and manual runs should publish immediately. This covers
          # posts created by ChatGPT, editors, and other non-GITHUB_TOKEN writers.
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Direct blog update detected; publishing immediately."
            exit 0
          fi

          # The upstream biweekly workflow is scheduled weekly and can complete
          # successfully on a no-op week. Keep the cadence guard here so a
          # workflow_run does not repost the previous article on those weeks.
          anchor_date="2026-06-03"
          today=$(date -u +%F)
          days_since_anchor=$(( ( $(date -u -d "$today" +%s) - $(date -u -d "$anchor_date" +%s) ) / 86400 ))

          if [ "$days_since_anchor" -ge 0 ] && [ $((days_since_anchor % 14)) -eq 0 ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Biweekly LinkedIn publishing window is open for $today."
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping LinkedIn publish for $today; upstream biweekly workflow made no scheduled post."
          fi

      - name: Checkout
        if: steps.cadence.outputs.should_publish == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        if: steps.cadence.outputs.should_publish == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine post path
        if: steps.cadence.outputs.should_publish == 'true'
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.post_path }}" ]; then
            target="${{ github.event.inputs.post_path }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              target=$(git diff --name-only "$before" "$after" -- '_posts/*.md' | tail -n 1)
            else
              target=$(git diff-tree --no-commit-id --name-only -r "$after" -- '_posts/*.md' | tail -n 1)
            fi
          else
            target=$(git ls-files -- "_posts/*.md" | sort | tail -n 1)
          fi

          if [ -z "$target" ]; then
            echo "No changed post file detected. Skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f "$target" ]; then
            echo "Post does not exist at $target. Skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Using post: $target"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "post_path=$target" >> "$GITHUB_OUTPUT"

      - name: Publish to LinkedIn
        if: steps.cadence.outputs.should_publish == 'true' && steps.resolve.outputs.skip != 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          SITE_URL: https://blog.falowen.app
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
          fi

          python scripts/post_to_social.py --post "${{ steps.resolve.outputs.post_path }}" $DRY
