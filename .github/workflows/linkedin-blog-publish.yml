name: Auto Post Blog Updates to LinkedIn

on:
  push:
    branches: [main]
    paths:
      - "_posts/*.md"
  workflow_dispatch:
    inputs:
      post_path:
        description: "Optional post file path (e.g. _posts/2026-03-29-example.md)"
        required: false
        type: string
      dry_run:
        description: "Run without publishing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  linkedin_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine post path
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.post_path }}" ]; then
            target="${{ github.event.inputs.post_path }}"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="HEAD~1"
            fi

            # Inspect the full push range so we don't miss post changes that
            # happened earlier in a multi-commit push.
            target=$(git diff --name-only "$before" "${{ github.sha }}" -- '_posts/*.md' | head -n 1)
          fi

          if [ -z "$target" ]; then
            echo "No changed post detected. Skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Using post: $target"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "post_path=$target" >> "$GITHUB_OUTPUT"

      - name: Publish to LinkedIn
        if: steps.resolve.outputs.skip != 'true'
        env:
          # These values are expected to be configured as GitHub Actions repository secrets.
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY="--dry-run"
          fi

          python scripts/post_to_social.py --post "${{ steps.resolve.outputs.post_path }}" $DRY
