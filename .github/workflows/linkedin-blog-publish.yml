name: Auto Post Blog Updates to LinkedIn

on:
  push:
    branches:
      - main
    paths:
      - "_posts/*.md"
      - ".github/workflows/linkedin-blog-publish.yml"
      - "scripts/post_to_social.py"
      - ".github/social-publish/linkedin-baseline.txt"
  workflow_run:
    workflows: ["30-Day Biweekly Blog Auto-Publish"]
    types: [completed]
  schedule:
    # Backstop for posts created through integrations whose push event does not
    # start another Actions workflow. The shared-post ledger prevents reposts.
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      post_path:
        description: "Optional post file path (e.g. _posts/2026-03-29-example.md)"
        required: false
        type: string
      dry_run:
        description: "Run without publishing"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: linkedin-blog-publish
  cancel-in-progress: false

jobs:
  linkedin_publish:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine unshared posts
        id: resolve
        shell: bash
        run: |
          shared_file=".github/social-publish/linkedin-shared-posts.txt"
          baseline_file=".github/social-publish/linkedin-baseline.txt"
          posts=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.post_path }}" ]; then
            requested="${{ github.event.inputs.post_path }}"
            if [ ! -f "$requested" ]; then
              echo "Requested post does not exist: $requested"
              exit 1
            fi
            posts+=("$requested")
          else
            if [ ! -f "$baseline_file" ]; then
              echo "LinkedIn baseline file is missing: $baseline_file"
              exit 1
            fi

            baseline=$(tr -d '\r\n' < "$baseline_file")
            if [ -z "$baseline" ] || ! git cat-file -e "$baseline^{commit}" 2>/dev/null; then
              echo "LinkedIn baseline is not a valid commit: $baseline"
              exit 1
            fi

            touch "$shared_file"
            while IFS= read -r post; do
              [ -z "$post" ] && continue
              if ! grep -Fqx "$post" "$shared_file"; then
                posts+=("$post")
              fi
            done < <(git diff --diff-filter=A --name-only "$baseline" HEAD -- '_posts/*.md' | sort)
          fi

          if [ "${#posts[@]}" -eq 0 ]; then
            echo "No unshared LinkedIn blog posts found."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found ${#posts[@]} post(s) to publish:"
          printf ' - %s\n' "${posts[@]}"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          {
            echo "posts<<EOF"
            printf '%s\n' "${posts[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate LinkedIn configuration
        if: steps.resolve.outputs.skip != 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        shell: bash
        run: |
          if [ -z "$LINKEDIN_ACCESS_TOKEN" ]; then
            echo "LINKEDIN_ACCESS_TOKEN is missing."
            exit 1
          fi

          if [ -z "$LINKEDIN_AUTHOR_URN" ] && [ -z "$LINKEDIN_PERSON_URN" ]; then
            echo "LINKEDIN_AUTHOR_URN and LINKEDIN_PERSON_URN are both missing."
            exit 1
          fi

      - name: Publish pending posts to LinkedIn
        if: steps.resolve.outputs.skip != 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          SITE_URL: https://blog.falowen.app
          POSTS: ${{ steps.resolve.outputs.posts }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          shared_file=".github/social-publish/linkedin-shared-posts.txt"

          while IFS= read -r post; do
            [ -z "$post" ] && continue
            echo "Publishing to LinkedIn: $post"

            dry_arg=""
            if [ "$DRY_RUN" = "true" ]; then
              dry_arg="--dry-run"
            fi

            python scripts/post_to_social.py --post "$post" --linkedin-only $dry_arg

            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run: not recording $post as shared."
              continue
            fi

            # Keep the local branch current before recording this successful post.
            git pull --rebase origin main
            mkdir -p "$(dirname "$shared_file")"
            touch "$shared_file"

            if grep -Fqx "$post" "$shared_file"; then
              echo "Already recorded as shared: $post"
              continue
            fi

            printf '%s\n' "$post" >> "$shared_file"
            sort -u "$shared_file" -o "$shared_file"

            git config user.name "falowen-social-bot"
            git config user.email "falowen-social-bot@users.noreply.github.com"
            git add "$shared_file"
            git commit -m "chore(social): record LinkedIn share for $(basename "$post")"
            git push origin HEAD:main
          done <<< "$POSTS"
