<div class="wrap topnav-container">
  <a class="topnav-brand" href="{{ '/' | relative_url }}" aria-label="Falowen Blog home">
    <span class="brand-mark">F</span>
    <span class="brand-copy">
      <strong>Falowen</strong>
      <small>German Blog</small>
    </span>
  </a>

  <button class="topnav-toggle" aria-expanded="false" aria-label="Open menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav class="topnav" aria-label="Main navigation">
    <ul class="topnav-list">
      <li class="{% if page.url == '/' %}active{% endif %}"><a href="{{ '/' | relative_url }}">Home</a></li>
      <li class="{% if page.url == '/about/' %}active{% endif %}"><a href="{{ '/about/' | relative_url }}">About</a></li>
      <li class="{% if page.url == '/search/' %}active{% endif %}"><a href="{{ '/search/' | relative_url }}">Search</a></li>
      <li class="{% if page.url == '/blogs/' %}active{% endif %}"><a href="{{ '/blogs/' | relative_url }}">Blogs</a></li>
      <li><a href="https://www.falowen.app/classes" target="_blank" rel="noopener">Upcoming Classes</a></li>
      <li class="{% if page.url == '/contact/' %}active{% endif %}"><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
      <li><a class="nav-cta" href="https://register.falowen.app" target="_blank" rel="noopener">Register</a></li>
      <li><button id="theme-toggle" class="theme-toggle" type="button">Dark Mode</button></li>
    </ul>
  </nav>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var toggle = document.querySelector('.topnav-toggle');
    var list = document.querySelector('.topnav-list');
    if (toggle && list) {
      toggle.addEventListener('click', function() {
        var expanded = toggle.getAttribute('aria-expanded') === 'true';
        toggle.setAttribute('aria-expanded', (!expanded).toString());
        list.classList.toggle('open');
      });
    }
  });
</script>
